<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach L Player</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #05070a;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.header h1 {
  margin: 0;
  font-size: 18px;
}

.header h2 {
  margin: 0;
  color: #00eaff;
}

.signin {
  border: 1px solid #444;
  padding: 10px;
  border-radius: 10px;
}

/* HERO */
.hero {
  padding: 40px 20px;
  background: linear-gradient(180deg, rgba(0,0,0,0.8), black),
  url('https://images.unsplash.com/photo-1590608897129-79da98d15969') center/cover;
}

.hero h1 {
  font-size: 42px;
  margin: 0;
}

.hero p {
  color: #00eaff;
}

.start-btn {
  margin-top: 20px;
  background: linear-gradient(90deg, #00eaff, #00ffa3);
  padding: 15px;
  border-radius: 30px;
  border: none;
  font-weight: bold;
}

/* CARDS */
.cards {
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  margin-bottom: 20px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.card a {
  color: #00eaff;
  text-decoration: none;
}

/* FILTER */
.filters {
  display: flex;
  gap: 10px;
  padding: 10px 20px;
}

.filters button {
  border: 1px solid #333;
  background: transparent;
  color: white;
  padding: 8px 12px;
  border-radius: 20px;
}

.filters .active {
  border-color: #00eaff;
  color: #00eaff;
}

/* LIVE */
.live {
  display: flex;
  gap: 10px;
  padding: 20px;
}

.live div {
  flex: 1;
  background: rgba(0,255,255,0.1);
  padding: 15px;
  border-radius: 15px;
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 60px;
  width: 100%;
  background: #111;
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}
</style>

</head>

<body>

<div class="header">
  <div>
    <h1>COACH L</h1>
    <h2>ACADEMY</h2>
  </div>
  <div class="signin">MEMBER SIGN IN</div>
</div>

<div class="hero">
  <h1>PODCASTS</h1>
  <p>Live Streams & Archives</p>
  <button class="start-btn">START LISTENING ▶</button>
</div>

<div class="cards">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d">
    <div class="card-content">
      <h3>YouTube Latest Teachings</h3>
      <p>Auto-updates to latest video.</p>
      <a href="#">WATCH LIVE →</a>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d">
    <div class="card-content">
      <h3>Browse Archives</h3>
      <p>Listen anytime.</p>
      <a href="#">BROWSE →</a>
    </div>
  </div>

</div>

<div class="filters">
  <button class="active">All</button>
  <button>Podcasts</button>
  <button>Radio</button>
  <button>Music</button>
</div>

<div class="live">
  <div>🔴 Live Stream</div>
  <div>📻 Radio</div>
  <div>🎧 Podcast</div>
</div>

<div class="player">
  <div>Coach L Live</div>
  <div>▶</div>
</div>

<div class="nav">
  <span>🏠</span>
  <span>🎙</span>
  <span>📻</span>
  <span>⚙</span>
</div>

</body>
</html>
