<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach L Player</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #05070a;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.brand h1 { margin: 0; font-size: 18px; }
.brand h2 { margin: 0; color: #00eaff; }

.signin {
  border: 1px solid #444;
  padding: 10px;
  border-radius: 10px;
}

/* HERO */
.hero {
  padding: 40px 20px;
  background: linear-gradient(180deg, rgba(0,0,0,0.8), black),
  url('https://images.unsplash.com/photo-1590608897129-79da98d15969') center/cover;
}

.hero h1 { font-size: 42px; margin: 0; }
.hero p { color: #00eaff; }

.start-btn {
  margin-top: 20px;
  background: linear-gradient(90deg, #00eaff, #00ffa3);
  padding: 15px;
  border-radius: 30px;
  border: none;
  font-weight: bold;
}

/* LIST */
.section {
  padding: 20px;
}

.item {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 10px;
  cursor: pointer;
}

.item:hover {
  background: rgba(0,255,255,0.1);
}

/* PLAYER */
.player {
  position: fixed;
  bottom: 60px;
  width: 100%;
  background: #111;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.play-btn {
  font-size: 22px;
  color: #00eaff;
  cursor: pointer;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <h1>COACH L</h1>
    <h2>PLAYER</h2>
  </div>
  <div class="signin">LOGIN</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>PODCASTS</h1>
  <p>Live Streams & Archives</p>
  <button class="start-btn">START LISTENING ▶</button>
</div>

<!-- RADIO -->
<div class="section">
  <h3>📻 Live Radio</h3>

  <div class="item" onclick="playRadio('https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one','BBC Radio 1')">
    BBC Radio 1
  </div>

  <div class="item" onclick="playRadio('https://icecast.radiofrance.fr/fip-midfi.mp3','FIP Radio')">
    FIP Radio
  </div>
</div>

<!-- PODCAST -->
<div class="section">
  <h3>🎧 Podcasts</h3>
  <div id="podcasts">Loading podcasts...</div>
</div>

<!-- PLAYER -->
<div class="player">
  <div id="nowPlaying">Nothing playing</div>
  <div class="play-btn" onclick="togglePlay()">▶</div>
</div>

<!-- NAV -->
<div class="nav">
  <span>🏠</span>
  <span>🎙</span>
  <span>📻</span>
  <span>⚙</span>
</div>

<script>
const audio = new Audio();
let isPlaying = false;

/* PLAY RADIO */
function playRadio(url, name) {
  audio.src = url;
  audio.play();
  isPlaying = true;
  document.getElementById("nowPlaying").innerText = name;
}

/* PLAY/PAUSE */
function togglePlay() {
  if (!audio.src) return;

  if (isPlaying) {
    audio.pause();
    isPlaying = false;
  } else {
    audio.play();
    isPlaying = true;
  }
}

/* LOAD PODCAST (RSS) */
async function loadPodcast() {
  try {
    const rssUrl = "https://feeds.simplecast.com/54nAGcIl"; // sample podcast

    const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(rssUrl));
    const text = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const items = xml.querySelectorAll("item");
    let html = "";

    items.forEach((item, i) => {
      if (i > 10) return;

      const title = item.querySelector("title")?.textContent;
      const audioUrl = item.querySelector("enclosure")?.getAttribute("url");

      html += `
        <div class="item" onclick="playPodcast('${audioUrl}','${title}')">
          ${title}
        </div>
      `;
    });

    document.getElementById("podcasts").innerHTML = html;

  } catch (e) {
    document.getElementById("podcasts").innerText = "Failed to load podcasts";
  }
}

/* PLAY PODCAST */
function playPodcast(url, title) {
  audio.src = url;
  audio.play();
  isPlaying = true;
  document.getElementById("nowPlaying").innerText = title;
}

loadPodcast();
</script>

</body>
</html>
