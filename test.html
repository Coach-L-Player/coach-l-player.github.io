*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#05010e;color:#b8d0e8;font-family:'Segoe UI',Arial,sans-serif;padding:14px;min-height:100vh}
h1{font-size:1rem;color:#00f5ff;letter-spacing:3px;text-transform:uppercase;margin-bottom:3px}
.sub{font-size:.65rem;color:#3a5870;margin-bottom:8px;letter-spacing:1px}
.note{font-size:.65rem;color:#ffb800;background:rgba(255,184,0,.08);border:1px solid rgba(255,184,0,.2);
  border-radius:5px;padding:8px 10px;margin-bottom:12px;line-height:1.6}
#startBtn{width:100%;padding:14px;background:transparent;border:2px solid #00f5ff;color:#00f5ff;
  font-size:.9rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;border-radius:8px;
  cursor:pointer;margin-bottom:14px}
#startBtn:active{background:#00f5ff;color:#000}
#startBtn:disabled{border-color:#1a3040;color:#1a3040;cursor:default}
#progress{font-size:.65rem;color:#3a5870;margin-bottom:10px;letter-spacing:1px;min-height:16px}
#summary{display:none;padding:10px 12px;border-radius:6px;margin-bottom:12px;
  background:rgba(0,245,255,.06);border:1px solid rgba(0,245,255,.2);font-size:.75rem}
#summary span{display:block;margin:3px 0}
.ok-c{color:#00ff88}.fail-c{color:#ff2d78}.warn-c{color:#ffb800}
.row{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:6px;
  border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);margin-bottom:5px}
.row.ok{border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.05)}
.row.fail{border-color:rgba(255,45,120,.3);background:rgba(255,45,120,.05)}
.row.warn{border-color:rgba(255,184,0,.25);background:rgba(255,184,0,.04)}
.icon{font-size:1rem;flex-shrink:0;width:22px;text-align:center}
.info{flex:1;min-width:0}
.sname{font-size:.78rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smeta{font-size:.52rem;color:#3a5870;letter-spacing:1px}
.badge{flex-shrink:0;font-size:.58rem;font-weight:700;padding:3px 7px;border-radius:3px;
  letter-spacing:1px;min-width:52px;text-align:center}
.badge.ok{background:rgba(0,255,136,.15);color:#00ff88}
.badge.fail{background:rgba(255,45,120,.15);color:#ff2d78}
.badge.warn{background:rgba(255,184,0,.12);color:#ffb800}
.badge.blocked{background:rgba(155,89,255,.15);color:#9b59ff}
.badge.pending{background:rgba(255,255,255,.04);color:#2a4050}
.badge.testing{background:rgba(0,245,255,.1);color:#00f5ff}
.row.blocked{border-color:rgba(155,89,255,.25);background:rgba(155,89,255,.04)}
.spin{display:inline-block;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

var results={},current=0;
var audio=new Audio();
/* Same proxy as the player — tells us if a station is CORS-blocked vs truly dead */
var PROXY='https://coach-l-proxy.duckdns.org:8443/';

function renderList(){
  var h='';
  for(var i=0;i<ALL.length;i++){
    var s=ALL[i];
    h+='<div class="row" id="row'+i+'">'
      +'<div class="icon">'+s.icon+'</div>'
      +'<div class="info"><div class="sname">'+s.name+'</div><div class="smeta">'+s.cat+'</div></div>'
      +'<div class="badge pending" id="badge'+i+'">—</div>'
      +'</div>';
  }
  document.getElementById('list').innerHTML=h;
}

function setRow(i,cls,label){
  var r=document.getElementById('row'+i),b=document.getElementById('badge'+i);
  if(r)r.className='row '+cls;
  if(b){b.className='badge '+cls;b.innerHTML=label;}
}

function testNext(){
  if(current>=ALL.length){finish();return;}
  var s=ALL[current],i=current;
  document.getElementById('progress').textContent='('+(i+1)+'/'+ALL.length+') '+s.name+'…';
  setRow(i,'testing','<span class="spin">↻</span>');
  audio.pause();
  try{audio.src='';}catch(e){}
  var done=false;

  /* — UNSTABLE: starts but takes too long — */
  var t=setTimeout(function(){
    if(done)return;done=true;
    results[s.name]='UNSTABLE';setRow(i,'warn','⚠️ UNSTABLE');
    current++;testNext();
  },8000);

  /* — Proxy second-pass: distinguishes CORS-BLOCKED from truly DEAD — */
  function tryProxy(){
    var pa=new Audio(),pd=false;
    var pt=setTimeout(function(){
      if(pd)return;pd=true;try{pa.src='';}catch(e){}
      results[s.name]='DEAD';setRow(i,'fail','❌ DEAD');
      current++;testNext();
    },6000);
    pa.onerror=function(){
      if(pd)return;pd=true;clearTimeout(pt);try{pa.src='';}catch(e){}
      results[s.name]='DEAD';setRow(i,'fail','❌ DEAD');
      current++;testNext();
    };
    pa.onplaying=function(){
      if(pd)return;pd=true;clearTimeout(pt);pa.pause();try{pa.src='';}catch(e){}
      results[s.name]='BLOCKED';setRow(i,'blocked','🚫 BLOCKED');
      current++;testNext();
    };
    try{
      pa.src=PROXY+encodeURIComponent(s.url);pa.load();
      pa.play().catch(function(){
        if(pd)return;pd=true;clearTimeout(pt);
        results[s.name]='DEAD';setRow(i,'fail','❌ DEAD');
        current++;testNext();
      });
    }catch(e){
      if(pd)return;pd=true;clearTimeout(pt);
      results[s.name]='DEAD';setRow(i,'fail','❌ DEAD');
      current++;testNext();
    }
  }

  audio.onerror=function(){
    if(done)return;done=true;clearTimeout(t);
    /* Error on direct → check via proxy to classify */
    tryProxy();
  };
  audio.onplaying=function(){
    if(done)return;done=true;clearTimeout(t);
    results[s.name]='OK';setRow(i,'ok','✅ LIVE');
    audio.pause();current++;
    setTimeout(testNext,200);
  };

  try{
    audio.src=s.url;audio.load();
    audio.play().catch(function(err){
      if(done)return;done=true;clearTimeout(t);
      if(err&&err.name==='NotAllowedError'){
        /* Browser blocked autoplay — not a stream issue, skip */
        results[s.name]='UNSTABLE';setRow(i,'warn','⚠️ UNSTABLE');
        current++;testNext();
      }else{
        tryProxy();
      }
    });
  }catch(e){
    if(done)return;done=true;clearTimeout(t);
    results[s.name]='DEAD';setRow(i,'fail','❌ DEAD');
    current++;testNext();
  }
}

function finish(){
  var ok=0,blocked=0,dead=0,unstable=0;
  for(var k in results){
    if(results[k]==='OK')ok++;
    else if(results[k]==='BLOCKED')blocked++;
    else if(results[k]==='DEAD')dead++;
    else unstable++;
  }
  document.getElementById('progress').textContent='Done!';
  var el=document.getElementById('summary');
  el.style.display='block';
  el.innerHTML=
    '<span class="ok-c">✅ Live (direct): '+ok+'</span>'+
    '<span style="color:#9b59ff">🚫 CORS-blocked (works via proxy): '+blocked+'</span>'+
    '<span class="fail-c">❌ Dead (truly offline): '+dead+'</span>'+
    '<span class="warn-c">⚠️ Unstable / Timeout: '+unstable+'</span>'+
    '<span style="color:#3a5870;font-size:.6rem;display:block;margin-top:8px">BLOCKED stations work in the player (via proxy). Only ❌ DEAD stations need replacing.</span>';
  document.getElementById('startBtn').textContent='▶ RUN AGAIN';
  document.getElementById('startBtn').disabled=false;
}

document.getElementById('startBtn').addEventListener('click',function(){
  current=0;results={};
  this.disabled=true;this.textContent='Testing… please wait';
  document.getElementById('summary').style.display='none';
  renderList();testNext();
});
renderList();
</script>
