#summary span,#podSummary span{display:block;margin:3px 0}
.ok-c{color:#00ff88}.fail-c{color:#ff2d78}.warn-c{color:#ffb800}
.row{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:6px;

.row.ok{border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.05)}
.row.fail{border-color:rgba(255,45,120,.3);background:rgba(255,45,120,.05)}
.row.warn{border-color:rgba(255,184,0,.25);background:rgba(255,184,0,.04)}
.row.blocked{border-color:rgba(155,89,255,.25);background:rgba(155,89,255,.04)}

.info{flex:1;min-width:0}
.sname{font-size:.78rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.badge.fail{background:rgba(255,45,120,.15);color:#ff2d78}

.badge.testing{background:rgba(0,245,255,.1);color:#00f5ff}
.spin{display:inline-block;animation:sp .7s linear infinite}

function renderList(){
  var h='',curCat='';
  for(var i=0;i<ALL.length;i++){
    var s=ALL[i];
    if(s.cat!==curCat){
      h+='<div class="cat-hdr">'+s.cat+'</div>';
      curCat=s.cat;
    }
    h+='<div class="row" id="row'+i+'">'
      +'<div class="icon">'+s.icon+'</div>'
      +'<div class="info"><div class="sname">'+s.name+'</div><div class="smeta">'+s.cat+'</div></div>'
      +'<div class="badge pending" id="badge'+i+'">—</div>'
      +'</div>';
  }
  document.getElementById('list').innerHTML=h;
}

function setRow(i,cls,label){
  var r=document.getElementById('row'+i),b=document.getElementById('badge'+i);
  if(r)r.className='row '+cls;
  if(b){b.className='badge '+cls;b.innerHTML=label;}
}

  if(rCurrent>=ALL.length){finishRadio();return;}
  var s=ALL[rCurrent],i=rCurrent;
  document.getElementById('progress').textContent='('+(i+1)+'/'+ALL.length+') '+s.name+'…';
  setRow(i,'testing','<span class="spin">↻</span>');
  audio.pause();
  try{audio.src='';}catch(e){}
  var done=false;

  var t=setTimeout(function(){
    if(done)return;done=true;
    results[s.name]='UNSTABLE';setRow(i,'warn','⚠️ UNSTABLE');
    rCurrent++;testNext();
  },9000);

  function tryProxy(){
    var pa=new Audio(),pd=false;
    var pt=setTimeout(function(){
      if(pd)return;pd=true;try{pa.src='';}catch(e){}
      results[s.name]='DEAD';setRow(i,'fail','❌ DEAD');
      rCurrent++;testNext();
    },7000);
    pa.onerror=function(){
      if(pd)return;pd=true;clearTimeout(pt);try{pa.src='';}catch(e){}
      results[s.name]='DEAD';setRow(i,'fail','❌ DEAD');
      rCurrent++;testNext();
    };
    pa.onplaying=function(){
      if(pd)return;pd=true;clearTimeout(pt);pa.pause();try{pa.src='';}catch(e){}
      results[s.name]='BLOCKED';setRow(i,'blocked','🔒 PROXY OK');
      rCurrent++;testNext();
    };
    try{
      pa.src=PROXY+encodeURIComponent(s.url);pa.load();
      pa.play().catch(function(){
        if(pd)return;pd=true;clearTimeout(pt);
        results[s.name]='DEAD';setRow(i,'fail','❌ DEAD');
        rCurrent++;testNext();
      });
    }catch(e){
      if(pd)return;pd=true;clearTimeout(pt);
      results[s.name]='DEAD';setRow(i,'fail','❌ DEAD');
      rCurrent++;testNext();
    }
  }

  audio.onerror=function(){
    if(done)return;done=true;clearTimeout(t);tryProxy();
  };
  audio.onplaying=function(){
    if(done)return;done=true;clearTimeout(t);
    results[s.name]='OK';setRow(i,'ok','✅ LIVE');
    audio.pause();rCurrent++;
    setTimeout(testNext,200);
  };

  try{
    audio.src=s.url;audio.load();
    audio.play().catch(function(err){
      if(done)return;done=true;clearTimeout(t);
      if(err&&err.name==='NotAllowedError'){
        results[s.name]='UNSTABLE';setRow(i,'warn','⚠️ UNSTABLE');
        rCurrent++;testNext();
      }else{tryProxy();}
    });
  }catch(e){
    if(done)return;done=true;clearTimeout(t);
    results[s.name]='DEAD';setRow(i,'fail','❌ DEAD');
    rCurrent++;testNext();
  }
}

function finishRadio(){
  var ok=0,blocked=0,dead=0,unstable=0;
  for(var k in results){
    if(results[k]==='OK')ok++;
    else if(results[k]==='BLOCKED')blocked++;
    else if(results[k]==='DEAD')dead++;
    else unstable++;
  }
  document.getElementById('progress').textContent='Done!';
  var el=document.getElementById('summary');
  el.style.display='block';
  el.innerHTML=
    '<span class="ok-c">✅ Live (direct): '+ok+'</span>'+
    '<span style="color:#9b59ff">🔒 Works via proxy: '+blocked+'</span>'+
    '<span class="fail-c">❌ Dead (truly offline): '+dead+'</span>'+
    '<span class="warn-c">⚠️ Unstable / Timeout: '+unstable+'</span>'+
    '<span style="color:#3a5870;font-size:.6rem;display:block;margin-top:8px">🔒 PROXY OK = works in the player. Only ❌ DEAD needs replacing.</span>';
  /* Start podcast test automatically */
  if(!podDone)runPodTest();
}

/* ══════════════ PODCAST RSS TEST ENGINE ══════════════ */
var podResults={},pCurrent=0,podDone=false;

function renderPodList(){
  var h='',curCat='';
  for(var i=0;i<PODS.length;i++){
    var p=PODS[i];
    if(p.cat!==curCat){
      h+='<div class="cat-hdr">'+p.cat+'</div>';
      curCat=p.cat;
    }
    h+='<div class="row" id="prow'+i+'">'
      +'<div class="icon">'+p.icon+'</div>'
      +'<div class="info"><div class="sname">'+p.name+'</div><div class="smeta">'+p.rss.replace('https://','').split('/')[0]+'</div></div>'
      +'<div class="badge pending" id="pbadge'+i+'">—</div>'
      +'</div>';
  }
  document.getElementById('podList').innerHTML=h;
}

function setPRow(i,cls,label){
  var r=document.getElementById('prow'+i),b=document.getElementById('pbadge'+i);
  if(r)r.className='row '+cls;
  if(b){b.className='badge '+cls;b.innerHTML=label;}
}

function testPodNext(){
  if(pCurrent>=PODS.length){finishPod();return;}
  var p=PODS[pCurrent],i=pCurrent;
  document.getElementById('podProgress').textContent='RSS ('+(i+1)+'/'+PODS.length+') '+p.name+'…';
  setPRow(i,'testing','<span class="spin">↻</span>');

  var done=false;
  var tout=setTimeout(function(){
    if(done)return;done=true;
    podResults[p.name]='DEAD';
    setPRow(i,'fail','❌ DEAD');
    pCurrent++;testPodNext();
  },8000);

  /* Try via rss2json proxy (same as player uses) */
  var api='https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(p.rss)+'&count=1';
  fetch(api)
    .then(function(r){return r.json();})
    .then(function(d){
      if(done)return;done=true;clearTimeout(tout);
      if(d.status==='ok'&&d.items&&d.items.length){
        podResults[p.name]='OK';
        setPRow(i,'ok','✅ FEED OK');
      }else if(d.status==='ok'){
        podResults[p.name]='EMPTY';
        setPRow(i,'warn','⚠️ EMPTY');
      }else{
        /* rss2json failed — try direct fetch */
        tryDirectRSS(p,i,tout);
        done=false; /* reopen */
        return;
      }
      pCurrent++;testPodNext();
    })
    .catch(function(){
      /* Network error on rss2json — try direct */
      if(!done){
        done=false;
        tryDirectRSS(p,i,tout);
      }
    });
}

function tryDirectRSS(p,i,tout){
  clearTimeout(tout);
  var tout2=setTimeout(function(){
    podResults[p.name]='DEAD';
    setPRow(i,'fail','❌ DEAD');
    pCurrent++;testPodNext();
  },7000);

  fetch(p.rss,{mode:'cors',cache:'no-store'})
    .then(function(r){
      clearTimeout(tout2);
      if(r.ok){
        podResults[p.name]='OK';
        setPRow(i,'ok','✅ DIRECT');
      }else{
        podResults[p.name]='DEAD';
        setPRow(i,'fail','❌ '+r.status);
      }
      pCurrent++;testPodNext();
    })
    .catch(function(){
      /* CORS block — try via own proxy */
      clearTimeout(tout2);
      var tout3=setTimeout(function(){
        podResults[p.name]='DEAD';
        setPRow(i,'fail','❌ DEAD');
        pCurrent++;testPodNext();
      },6000);
      fetch(PROXY+encodeURIComponent(p.rss))
        .then(function(r2){
          clearTimeout(tout3);
          if(r2.ok){
            podResults[p.name]='PROXY';
            setPRow(i,'blocked','🔒 VIA PROXY');
          }else{
            podResults[p.name]='DEAD';
            setPRow(i,'fail','❌ DEAD');
          }
          pCurrent++;testPodNext();
        })
        .catch(function(){
          clearTimeout(tout3);
          podResults[p.name]='DEAD';
          setPRow(i,'fail','❌ DEAD');
          pCurrent++;testPodNext();
        });
    });
}

function finishPod(){
  podDone=true;
  var ok=0,proxy=0,dead=0,empty=0;
  for(var k in podResults){
    if(podResults[k]==='OK')ok++;
    else if(podResults[k]==='PROXY')proxy++;
    else if(podResults[k]==='DEAD')dead++;
    else empty++;
  }
  document.getElementById('podProgress').textContent='Done!';
  var el=document.getElementById('podSummary');
  el.style.display='block';
  el.innerHTML=
    '<span class="ok-c">✅ Feed accessible: '+ok+'</span>'+
    '<span style="color:#9b59ff">🔒 Works via proxy: '+proxy+'</span>'+
    '<span class="warn-c">⚠️ Feed empty: '+empty+'</span>'+
    '<span class="fail-c">❌ Dead / not found: '+dead+'</span>'+
    '<span style="color:#3a5870;font-size:.6rem;display:block;margin-top:8px">✅ + 🔒 = loads in player. ❌ = update RSS URL needed.</span>';
  document.getElementById('startBtn').textContent='▶ RUN AGAIN';
  document.getElementById('startBtn').disabled=false;
}

/* ══════════════ TABS ══════════════ */
var tabs=document.querySelectorAll('.tab');
for(var ti=0;ti<tabs.length;ti++)(function(t){
  t.addEventListener('click',function(){
    for(var j=0;j<tabs.length;j++){tabs[j].classList.remove('on');}
    t.classList.add('on');
    var id=t.getAttribute('data-t');
    document.getElementById('tc-radio').classList[id==='radio'?'add':'remove']('on');
    document.getElementById('tc-pod').classList[id==='pod'?'add':'remove']('on');
  });
})(tabs[ti]);

function runPodTest(){
  pCurrent=0;podResults={};podDone=false;
  document.getElementById('podSummary').style.display='none';
  renderPodList();testPodNext();
}

/* ══════════════ START BUTTON ══════════════ */
document.getElementById('startBtn').addEventListener('click',function(){
  rCurrent=0;results={};pCurrent=0;podResults={};podDone=false;
  this.disabled=true;this.textContent='Testing… please wait';
  document.getElementById('summary').style.display='none';
  document.getElementById('podSummary').style.display='none';
  renderList();renderPodList();
  testNext(); /* radio first; podcast auto-starts when radio finishes */
});

/* ══════════════ INIT ══════════════ */
renderList();
renderPodList();
</script>
